<div class="app-container">
  <div class="card-container">
    <header class="header">
      <h1>Password Checker</h1>
    </header>

    <div class="content-grid-split">
      
      <section class="left-column">
        
        <div class="input-group">
          <label for="password-input">Check Password Strength</label>
          <input
            id="password-input"
            type="text"
            [formControl]="passwordControl"
            [ngClass]="'input-' + getSecurityClass()"
            placeholder="Enter password..."
          />
        </div>

        <div class="input-group">
          <label for="word-input">Generate Passwords</label>
          <input
            id="word-input"
            type="text"
            [formControl]="wordControl"
            placeholder="Enter a keyword..."
          />
        </div>

        <div *ngIf="generatedPasswords.length > 0" class="generated-password-section">
          <h4>Generated Passwords</h4>
          <div class="batch-grid">
            <div 
              *ngFor="let pwd of generatedPasswords; let i = index" 
              class="generated-password-display"
              [class.active-selection]="selectedGeneratedIndex === i"
              (click)="selectGeneratedPassword(pwd, i)"
            >
              <span>{{ pwd }}</span>
              <button (click)="copyPassword(pwd, $event)">Copy</button>
            </div>
          </div>
        </div>
      </section>

      <section class="sidebar-column">
        <h3>Status</h3>

        <ng-container *ngIf="activeMetrics; else idleSidebar">
          <div class="strength-module">
            <div class="strength-track">
              <div class="strength-fill" [ngClass]="'fill-' + activeMetrics.security_level"></div>
            </div>
            <p>{{ getSecurityMessage() }}</p>
          </div>

          <div class="requirements-panel">
            <ul>
              <li [ngClass]="activeMetrics.details.length >= 12 ? 'met' : 'unmet'">
                Length 12+ characters
              </li>
              <li [ngClass]="activeMetrics.details.has_uppercase ? 'met' : 'unmet'">
                Uppercase letter
              </li>
              <li [ngClass]="activeMetrics.details.has_lowercase ? 'met' : 'unmet'">
                Lowercase letter
              </li>
              <li [ngClass]="activeMetrics.details.has_numbers ? 'met' : 'unmet'">
                Number
              </li>
              <li [ngClass]="activeMetrics.details.has_symbols ? 'met' : 'unmet'">
                Special symbol
              </li>
            </ul>
          </div>
        </ng-container>

        <ng-template #idleSidebar>
          <p>Enter a password to see its strength or generate a new one.</p>
        </ng-template>

      </section>
    </div>
  </div>
</div>
